services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: campus-lab-rabbitmq
    hostname: campus-lab-rabbitmq
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: campus-lab-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: bun run apps/backend/src/index.ts
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - RABBITMQ_URL=amqp://guest:guest@campus-lab-rabbitmq:5672
    volumes:
      - ./runtime:/app/runtime
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    container_name: campus-lab-consumer
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: bun run ./scripts/consumer-entry.ts
    environment:
      - RABBITMQ_URL=amqp://guest:guest@campus-lab-rabbitmq:5672
    volumes:
      - ./runtime:/app/runtime
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq-data:
